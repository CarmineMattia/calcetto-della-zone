[build]
publish = "."
command = "echo \"Static deploy: no build step\""

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/"
[headers.values]
Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
for = "/app.js"
[headers.values]
Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
for = "/styles.css"
[headers.values]
Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
